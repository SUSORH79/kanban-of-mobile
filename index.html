<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Gestión CNC - Registro de Incidencias</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="home-page">
    <div class="container">
        <header class="app-header">
            <h1>🏭 Sistema de Gestión CNC</h1>
            <p class="subtitle">Registro y Análisis de Incidencias</p>
        </header>

        <main class="role-selection">
            <div class="role-card" onclick="window.location.href='manager.html'">
                <div class="icon">📝</div>
                <h2>Registrar Incidencia</h2>
                <p>Introduce datos del formulario físico</p>
            </div>

            <div class="role-card" onclick="window.location.href='manager.html#dashboard'">
                <div class="icon">📊</div>
                <h2>Dashboard y Reportes</h2>
                <p>Análisis, estadísticas y generación de reportes</p>
            </div>

            <div class="role-card" onclick="window.location.href='formulario_operario.html'" target="_blank">
                <div class="icon">🖨️</div>
                <h2>Imprimir Formulario</h2>
                <p>Formulario físico para las máquinas</p>
            </div>
        </main>

        <footer>
            <p>Sistema CNC v2.0 - 2026</p>
        </footer>
    </div>
</body>

</html>
